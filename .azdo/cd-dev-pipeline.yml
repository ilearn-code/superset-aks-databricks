# Azure DevOps CD Pipeline - Deploy to Development
# Automatically deploys to dev environment on successful CI build

trigger: none  # Triggered by CI pipeline completion

pr: none

resources:
  pipelines:
  - pipeline: ci-pipeline
    source: 'Superset-CI'
    trigger:
      branches:
        include:
        - develop
        - feature/*

variables:
  - group: superset-dev
  - name: environment
    value: 'dev'
  - name: azureSubscription
    value: 'azure-service-connection'
  - name: aksResourceGroup
    value: 'rg-flash-superset-dev'
  - name: aksClusterName
    value: 'aks-flash-superset-dev'
  - name: kubernetesNamespace
    value: 'superset'
  - name: acrName
    value: 'acrflashsupersetdev'
  - name: helmReleaseName
    value: 'superset'

# Default pool configuration for all jobs
pool: 
  name: 'default'
  demands:
  - agent.name -equals azure-agent

stages:
- stage: DeployInfrastructure
  displayName: 'Deploy Infrastructure (Terraform)'
  jobs:
  - job: TerraformDeploy
    displayName: 'Deploy with Terraform'
    steps:
    - download: ci-pipeline
      artifact: terraform-modules
      displayName: 'Download Terraform Modules'

    - task: TerraformInstaller@0
      inputs:
        terraformVersion: '1.5.0'
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Pipeline.Workspace)/ci-pipeline/terraform-modules
          
          terraform init `
            -backend-config="resource_group_name=rg-terraform-state" `
            -backend-config="storage_account_name=sttfstateflashsuperset" `
            -backend-config="container_name=tfstate" `
            -backend-config="key=superset-$(environment).tfstate"

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Pipeline.Workspace)/ci-pipeline/terraform-modules
          
          terraform plan `
            -var-file="environments/$(environment).tfvars" `
            -out=tfplan `
            -input=false

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd $(Pipeline.Workspace)/ci-pipeline/terraform-modules
          
          terraform apply -auto-approve tfplan
          
          # Export outputs
          terraform output -json | Out-File -FilePath "$(Build.ArtifactStagingDirectory)/terraform-outputs.json"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/terraform-outputs.json'
        artifact: 'terraform-outputs'
        publishLocation: 'pipeline'
      displayName: 'Publish Terraform Outputs'

- stage: DeployApplication
  displayName: 'Deploy Application to Dev'
  dependsOn: DeployInfrastructure
  condition: succeeded()
  jobs:
  - deployment: DeployToAKS
    displayName: 'Deploy Superset to AKS'
    environment: 'superset-dev'
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: ci-pipeline
            artifact: helm-charts
            displayName: 'Download Helm Charts'

          - download: ci-pipeline
            artifact: kubernetes-manifests
            displayName: 'Download K8s Manifests'

          - download: ci-pipeline
            artifact: build-metadata
            displayName: 'Download Build Metadata'

          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: '3.12.0'
            displayName: 'Install Helm'

          - task: AzureCLI@2
            displayName: 'Get AKS Credentials'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials `
                  --resource-group $(aksResourceGroup) `
                  --name $(aksClusterName) `
                  --overwrite-existing

          - task: Kubernetes@1
            displayName: 'Create Namespace'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: $(azureSubscription)
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: 'apply'
              useConfigurationFile: true
              configurationType: 'inline'
              inline: |
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: $(kubernetesNamespace)
                  labels:
                    environment: $(environment)
                    project: flash-superset

          - task: AzureCLI@2
            displayName: 'Configure Secrets from Key Vault'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $KEY_VAULT_NAME = "kv-flash-superset-dev"

                $DB_PASSWORD = az keyvault secret show --vault-name $KEY_VAULT_NAME --name "db-password" --query value -o tsv 2>$null
                $SECRET_KEY = az keyvault secret show --vault-name $KEY_VAULT_NAME --name "secret-key" --query value -o tsv 2>$null
                $DATABRICKS_TOKEN = az keyvault secret show --vault-name $KEY_VAULT_NAME --name "databricks-token" --query value -o tsv 2>$null

                if ([string]::IsNullOrWhiteSpace($DB_PASSWORD) -or [string]::IsNullOrWhiteSpace($SECRET_KEY) -or [string]::IsNullOrWhiteSpace($DATABRICKS_TOKEN)) {
                  throw "Required secrets are missing from Key Vault: $KEY_VAULT_NAME"
                }

                kubectl create secret generic superset-secrets `
                  --from-literal=database-uri="postgresql+psycopg2://superset:$DB_PASSWORD@superset-postgresql:5432/superset" `
                  --from-literal=redis-uri="redis://superset-redis-master:6379/0" `
                  --from-literal=secret-key="$SECRET_KEY" `
                  --from-literal=guest-token-secret="$SECRET_KEY" `
                  --from-literal=azure-client-id="$(AZURE_CLIENT_ID)" `
                  --from-literal=azure-client-secret="$(AZURE_CLIENT_SECRET)" `
                  --from-literal=azure-tenant-id="$(AZURE_TENANT_ID)" `
                  --from-literal=databricks-token="$DATABRICKS_TOKEN" `
                  --namespace $(kubernetesNamespace) `
                  --dry-run=client -o yaml | kubectl apply -f -

          - task: AzureCLI@2
            displayName: 'Deploy with Helm'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                cd $(Pipeline.Workspace)/ci-pipeline/helm-charts
                
                # Read image tag
                $IMAGE_TAG = Get-Content "$(Pipeline.Workspace)/ci-pipeline/build-metadata/image-tag.txt" -Raw
                $IMAGE_TAG = $IMAGE_TAG.Trim()
                
                # Update Helm dependencies
                helm dependency update
                
                # Deploy
                helm upgrade --install $(helmReleaseName) . `
                  --namespace $(kubernetesNamespace) `
                  --values values.yaml `
                  --values environments/$(environment)/values.yaml `
                  --set image.repository=$(acrName).azurecr.io/superset `
                  --set image.tag=$IMAGE_TAG `
                  --timeout 20m `
                  --wait `
                  --debug

          - task: Kubernetes@1
            displayName: 'Verify Deployment'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: $(azureSubscription)
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: 'get'
              arguments: 'pods,svc,ingress -n $(kubernetesNamespace)'

- stage: SmokeTests
  displayName: 'Run Smoke Tests'
  dependsOn: DeployApplication
  condition: succeeded()
  jobs:
  - job: RunTests
    displayName: 'Execute Smoke Tests'
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Get Superset URL'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials `
            --resource-group $(aksResourceGroup) `
            --name $(aksClusterName) `
            --overwrite-existing
          
          $SUPERSET_URL = kubectl get ingress -n $(kubernetesNamespace) -o jsonpath='{.items[0].spec.rules[0].host}'
          Write-Host "Superset URL: https://$SUPERSET_URL"
          Write-Host "##vso[task.setvariable variable=SUPERSET_URL]$SUPERSET_URL"

    - powershell: |
        Write-Host "Testing Superset at https://$(SUPERSET_URL)"
        
        # Wait for service to be ready
        for ($i = 1; $i -le 30; $i++) {
          try {
            $response = Invoke-WebRequest -Uri "https://$(SUPERSET_URL)/health" -SkipCertificateCheck -TimeoutSec 5
            if ($response.StatusCode -eq 200) {
              Write-Host "✅ Superset is healthy!"
              exit 0
            }
          } catch {
            Write-Host "Waiting for Superset to be ready... ($i/30)"
            Start-Sleep -Seconds 10
          }
        }
        
        Write-Host "❌ Superset failed to become healthy"
        exit 1
      displayName: 'Health Check'

    - task: AzureCLI@2
      displayName: 'Test Database Connection'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials `
            --resource-group $(aksResourceGroup) `
            --name $(aksClusterName) `
            --overwrite-existing
          
          kubectl exec -n $(kubernetesNamespace) deployment/superset -- superset fab list-users
      continueOnError: true

- stage: Notification
  displayName: 'Send Notifications'
  dependsOn: SmokeTests
  condition: always()
  jobs:
  - job: SendNotification
    displayName: 'Notify Team'
    pool:
      vmImage: 'windows-latest'
    steps:
    - powershell: |
        $STATUS = "${{ job.status }}"
        Write-Host "Deployment to $(environment) completed with status: $STATUS"
        # Add your notification logic here (Teams, Slack, Email, etc.)
      displayName: 'Send Notification'
