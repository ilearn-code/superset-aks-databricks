# GitHub Actions CD Pipeline - Deploy to Production
# Manual deployment to production with approval gates

name: CD - Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (leave empty for latest from main)'
        required: false
        type: string
      force_deploy:
        description: 'Force deployment (skip some validations)'
        required: false
        type: boolean
        default: false

env:
  AZURE_SUBSCRIPTION: 'azure-service-connection'
  AKS_RESOURCE_GROUP: 'rg-flash-superset-prod'
  AKS_CLUSTER_NAME: 'aks-flash-superset-prod'
  KUBERNETES_NAMESPACE: 'superset-prod'
  ACR_NAME: 'acrflashsupersetprod'
  HELM_RELEASE_NAME: 'superset'
  ENVIRONMENT: 'prod'

jobs:
  validate-and-prepare:
    name: Validate Production Deployment
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.determine-tag.outputs.IMAGE_TAG }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main  # Always deploy from main for production
    
    - name: Determine image tag
      id: determine-tag
      run: |
        if [ -n "${{ github.event.inputs.image_tag }}" ]; then
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
        else
          # Use latest commit from main
          IMAGE_TAG="${{ github.sha }}"
        fi
        echo "IMAGE_TAG=${IMAGE_TAG:0:7}" >> $GITHUB_OUTPUT
        echo "Will deploy image tag: ${IMAGE_TAG:0:7}"
    
    - name: Pre-deployment validation
      run: |
        echo "=== Pre-deployment Validation ==="
        echo "Branch: ${{ github.ref }}"
        echo "Image Tag: ${{ steps.determine-tag.outputs.IMAGE_TAG }}"
        echo "Force Deploy: ${{ github.event.inputs.force_deploy }}"
        
        # Add any pre-deployment checks here
        echo "✅ Validation passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate-and-prepare
    
    environment:
      name: production
      url: https://superset.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
          --name ${{ env.AKS_CLUSTER_NAME }} \
          --overwrite-existing
    
    - name: Pre-deployment backup
      run: |
        echo "Creating pre-deployment backup..."
        
        # Create backup directory with timestamp
        BACKUP_DIR="backup-$(date +%Y%m%d-%H%M%S)"
        mkdir -p $BACKUP_DIR
        
        # Backup current deployment
        kubectl get deployment superset -n ${{ env.KUBERNETES_NAMESPACE }} -o yaml > $BACKUP_DIR/deployment.yaml || echo "No existing deployment"
        kubectl get configmap -n ${{ env.KUBERNETES_NAMESPACE }} -o yaml > $BACKUP_DIR/configmaps.yaml || echo "No configmaps"
        
        echo "Backup created in $BACKUP_DIR"
    
    - name: Create namespace
      run: |
        kubectl create namespace ${{ env.KUBERNETES_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Deploy with Helm
      run: |
        # Update Helm dependencies
        cd helm
        helm dependency update
        
        # Deploy with production values
        helm upgrade --install ${{ env.HELM_RELEASE_NAME }} . \
          --namespace ${{ env.KUBERNETES_NAMESPACE }} \
          --values values-prod.yaml \
          --set image.tag=${{ needs.validate-and-prepare.outputs.image-tag }} \
          --wait \
          --timeout=10m
    
    - name: Verify deployment
      run: |
        echo "=== Verifying Deployment ==="
        
        # Wait for rollout
        kubectl rollout status deployment/superset -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=600s
        
        # Check pod status
        kubectl get pods -n ${{ env.KUBERNETES_NAMESPACE }}
        
        # Check service status  
        kubectl get services -n ${{ env.KUBERNETES_NAMESPACE }}
    
    - name: Run production smoke tests
      run: |
        echo "Running production smoke tests..."
        
        # Get ingress or service endpoint
        INGRESS_IP=$(kubectl get ingress superset -n ${{ env.KUBERNETES_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        SERVICE_IP=$(kubectl get service superset -n ${{ env.KUBERNETES_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        
        ENDPOINT=""
        if [ -n "$INGRESS_IP" ]; then
          ENDPOINT="https://$INGRESS_IP"
        elif [ -n "$SERVICE_IP" ]; then
          ENDPOINT="http://$SERVICE_IP:8088"
        fi
        
        if [ -n "$ENDPOINT" ]; then
          echo "Testing endpoint: $ENDPOINT"
          
          # Wait for application to be ready
          sleep 60
          
          # Test health endpoint
          for i in {1..10}; do
            if curl -f -s "$ENDPOINT/health" > /dev/null; then
              echo "✅ Production health check passed"
              break
            else
              echo "Attempt $i: Health check failed, retrying in 30s..."
              sleep 30
            fi
          done
        else
          echo "⚠️ No external endpoint found, skipping external tests"
        fi
    
    - name: Post-deployment monitoring setup
      run: |
        echo "Setting up post-deployment monitoring..."
        
        # Add any monitoring setup here
        echo "✅ Monitoring configured"
    
    - name: Production Deployment Summary
      run: |
        echo "🚀 Production deployment completed successfully!"
        echo "Environment: Production"
        echo "Namespace: ${{ env.KUBERNETES_NAMESPACE }}"
        echo "Image: ${{ env.ACR_NAME }}.azurecr.io/superset:${{ needs.validate-and-prepare.outputs.image-tag }}"
        echo "Deployment time: $(date)"
        
        # Get final status
        kubectl get all -n ${{ env.KUBERNETES_NAMESPACE }}