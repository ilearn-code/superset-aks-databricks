# Development Environment Configuration for Superset
# This configuration is optimized for development and testing purposes

apiVersion: v1
kind: Namespace
metadata:
  name: superset-dev

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-config
  namespace: superset-dev
data:
  DATABASE_URI: "postgresql+psycopg2://<username>:<password>@postgres:5432/superset"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "<your-secret-key>"
  ENABLE_CORS: "true"
  CORS_OPTIONS: "['*']"
  FEATURE_FLAGS: "['ALERTS', 'DASHBOARD_NATIVE_FILTERS']"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: superset
spec:
  replicas: 2  # Lower replica count for dev
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      containers:
        - name: superset
          image: apache/superset:latest
          ports:
            - containerPort: 8088
          env:
            - name: DATABASE_URI
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: DATABASE_URI
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: SECRET_KEY
            - name: ENABLE_CORS
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: ENABLE_CORS
            - name: CORS_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: CORS_OPTIONS
            - name: FEATURE_FLAGS
              valueFrom:
                configMapKeyRef:
                  name: superset-config
                  key: FEATURE_FLAGS
          resources:
            limits:
              memory: "1Gi"  # Lower resources for non-prod
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: superset-service
  namespace: superset
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: 8088
  selector:
    app: superset

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset-ingress
  namespace: superset
spec:
  rules:
    - host: superset.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset-service
                port:
                  number: 8088

---
apiVersion: v1
kind: Secret
metadata:
  name: superset-secrets
  namespace: superset
type: Opaque
data:
  username: <base64-encoded-username>
  password: <base64-encoded-password>
  secret_key: <base64-encoded-secret-key>